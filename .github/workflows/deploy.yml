name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node setup ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Install dependencies ──────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Build Next.js static export ──────────────────────────────────────────
      - name: Build
        run: npm run build
        # next.config.ts has output: "export" — produces the out/ directory

      # ── AWS credentials via IAM access keys ──────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ── Sync to S3 ───────────────────────────────────────────────────────────
      - name: Deploy to S3
        run: |
          # Long-lived assets (JS, CSS, images) — cache 1 year, immutable
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"

          # HTML — no cache so browsers always fetch the latest shell
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html"

      # ── Bust CloudFront cache ─────────────────────────────────────────────────
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      # ── Summary ──────────────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "### Deployed successfully :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://tools.architectwithappu.online" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
